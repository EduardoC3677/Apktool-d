name: Recompile APK/JAR

on:
  workflow_dispatch:
    inputs:
      # ----- Source -----
      decompiled_repo_url:
        description: 'URL of the GitHub repository containing the decompiled APK/JAR (e.g. https://github.com/user/repo)'
        required: true
        type: string
      branch:
        description: 'Branch to clone (optional, defaults to the repository default branch)'
        required: false
        default: ''
        type: string

      # ----- Common build flags (toggles) -----
      force:
        description: 'Skip changes detection and build all files (-f / --force) [APK only]'
        required: false
        default: true
        type: boolean
      no_apk:
        description: 'Disable repacking of built files into a new apk (--no-apk) [APK only]'
        required: false
        default: false
        type: boolean
      no_crunch:
        description: 'Disable crunching of resource files (-nc / --no-crunch) [APK only]'
        required: false
        default: false
        type: boolean
      copy_original:
        description: 'Copy original AndroidManifest.xml and META-INF (-c / --copy-original) [APK only]'
        required: false
        default: false
        type: boolean
      debuggable:
        description: 'Set android:debuggable="true" in AndroidManifest.xml (--debuggable) [APK only]'
        required: false
        default: false
        type: boolean
      net_sec_conf:
        description: 'Add a permissive network_security_config.xml (--net-sec-conf) [APK only]'
        required: false
        default: false
        type: boolean

      # ----- aapt2-forwarded flags (toggles) -----
      no_resource_removal:
        description: 'Disable aapt2 auto-removal of resources without defaults (--no-resource-removal). Use for RRO/overlay APKs. [APK only]'
        required: false
        default: false
        type: boolean
      proguard_conditional_keep_rules:
        description: 'Generate conditional ProGuard keep rules with aapt2 (--proguard-conditional-keep-rules) [APK only]'
        required: false
        default: false
        type: boolean
      no_resource_quarantine:
        description: 'Disable auto-quarantine of empty/invalid PNGs (--no-resource-quarantine). By default, uncompilable PNGs are packed verbatim. Pass this to restore strict aapt2 behaviour. [APK only]'
        required: false
        default: false
        type: boolean
      keep_cross_package_metadata:
        description: 'Keep <meta-data> entries that reference resources from external packages (--keep-cross-package-metadata). By default these are stripped. [APK only]'
        required: false
        default: false
        type: boolean

      # ----- aapt2-forwarded flags (with arguments) -----
      use_png_compression_level:
        description: 'Enable --png-compression-level [APK only]'
        required: false
        default: false
        type: boolean
      png_compression_level:
        description: 'PNG zlib compression level [0-9] (only applied if "use_png_compression_level" is checked). aapt2 default: 9.'
        required: false
        default: '9'
        type: string

      use_aapt:
        description: 'Use a custom aapt2 binary (--aapt) [APK only]'
        required: false
        default: false
        type: boolean
      aapt_path:
        description: 'Absolute path to a custom aapt2 binary (only applied if "use_aapt" is checked).'
        required: false
        default: ''
        type: string

      use_jobs:
        description: 'Override the parallel-jobs count (-j / --jobs) [APK only]'
        required: false
        default: false
        type: boolean
      jobs:
        description: 'Number of parallel jobs (only applied if "use_jobs" is checked).'
        required: false
        default: '4'
        type: string

      use_frame_path:
        description: 'Use a custom framework directory (-p / --frame-path) [APK only]'
        required: false
        default: false
        type: boolean
      frame_path:
        description: 'Path to framework files (only applied if "use_frame_path" is checked).'
        required: false
        default: ''
        type: string

      # ----- Verbosity -----
      verbose:
        description: 'Increase output verbosity (-v)'
        required: false
        default: false
        type: boolean
      quiet:
        description: 'Suppress normal output (-q)'
        required: false
        default: false
        type: boolean

      # ----- Misc -----
      extra_args:
        description: 'Additional raw apktool build arguments appended last (advanced; space-separated). Use only if the flag you need is not exposed above.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  recompile:
    runs-on: ubuntu-latest
    name: Recompile decompiled APK/JAR
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: .github/ehcosmart.jks
          sparse-checkout-cone-mode: false

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Download apktool from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/apktool-download
          gh release download --repo "${{ github.repository }}" \
            --pattern "apktool-*.jar" --dir /tmp/apktool-download
          JAR_PATH=$(find /tmp/apktool-download -name "apktool-*.jar" | head -1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::Failed to download apktool JAR from latest release"
            exit 1
          fi
          echo "APKTOOL_JAR=$JAR_PATH" >> "$GITHUB_ENV"
          echo "Downloaded apktool: $JAR_PATH"

      - name: Clone decompiled repository
        run: |
          REPO_URL="${{ inputs.decompiled_repo_url }}"
          # Normalize URL (remove trailing slash)
          REPO_URL="${REPO_URL%/}"
          REPO_NAME=$(basename "$REPO_URL")

          git lfs install

          BRANCH="${{ inputs.branch }}"
          if [ -n "$BRANCH" ]; then
            echo "Cloning branch: $BRANCH"
            git clone --branch "$BRANCH" "$REPO_URL" "/tmp/decompiled-source"
          else
            git clone "$REPO_URL" "/tmp/decompiled-source"
          fi

          cd /tmp/decompiled-source
          git lfs pull

          echo "DECOMPILED_DIR=/tmp/decompiled-source" >> "$GITHUB_ENV"
          echo "REPO_NAME=$REPO_NAME" >> "$GITHUB_ENV"
          echo "Cloned decompiled source from: $REPO_URL"
          ls -la /tmp/decompiled-source/

      - name: Detect source type
        run: |
          DECOMPILED_DIR="/tmp/decompiled-source"
          if [ -f "$DECOMPILED_DIR/apktool.yml" ]; then
            APK_FILENAME=$(grep 'apkFileName:' "$DECOMPILED_DIR/apktool.yml" | head -1 | sed "s/.*apkFileName:[[:space:]]*//" | sed "s/^[\"']//;s/[\"']$//")
            if [ -z "$APK_FILENAME" ]; then
              if [ -f "$DECOMPILED_DIR/AndroidManifest.xml" ]; then
                echo "SOURCE_TYPE=apk" >> "$GITHUB_ENV"
                echo "Detected APK decompiled source (apkFileName missing, AndroidManifest.xml found)"
              else
                echo "SOURCE_TYPE=jar" >> "$GITHUB_ENV"
                echo "Detected JAR decompiled source (apkFileName missing, no AndroidManifest.xml)"
              fi
            elif echo "$APK_FILENAME" | grep -qi '\.jar$'; then
              echo "SOURCE_TYPE=jar" >> "$GITHUB_ENV"
              echo "Detected JAR decompiled source (apkFileName: $APK_FILENAME)"
            else
              echo "SOURCE_TYPE=apk" >> "$GITHUB_ENV"
              echo "Detected APK decompiled source (apkFileName: $APK_FILENAME)"
            fi
          elif [ -f "$DECOMPILED_DIR/AndroidManifest.xml" ]; then
            echo "SOURCE_TYPE=apk" >> "$GITHUB_ENV"
            echo "Detected APK decompiled source (AndroidManifest.xml found)"
          else
            echo "SOURCE_TYPE=jar" >> "$GITHUB_ENV"
            echo "Detected JAR decompiled source (no apktool.yml or AndroidManifest.xml)"
          fi

      - name: Download Android 16 framework (API 36)
        if: env.SOURCE_TYPE == 'apk'
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip
          mkdir -p /tmp/android-sdk
          # Download Android SDK command-line tools (update URL when newer versions are released)
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          wget -q "$CMDLINE_TOOLS_URL" -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/android-sdk/cmdline-tools
          mv /tmp/android-sdk/cmdline-tools/cmdline-tools /tmp/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=/tmp/android-sdk
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-36"
          FRAMEWORK_PATH="$ANDROID_HOME/platforms/android-36/android.jar"
          echo "Framework downloaded at: $FRAMEWORK_PATH"
          ls -la "$FRAMEWORK_PATH"

      - name: Install framework into apktool
        if: env.SOURCE_TYPE == 'apk'
        run: |
          ANDROID_HOME=/tmp/android-sdk
          FRAMEWORK_PATH="$ANDROID_HOME/platforms/android-36/android.jar"
          java -jar "${{ env.APKTOOL_JAR }}" install-framework "$FRAMEWORK_PATH"
          echo "Android 16 framework installed successfully."

      - name: Recompile APK
        if: env.SOURCE_TYPE == 'apk'
        run: |
          # Build the apktool argument list. The CLI grammar is:
          #     apktool [-v|-q] b [build-options...] <apkDir>
          # Verbose/quiet are GLOBAL options, must come BEFORE the "b" subcommand.
          GLOBAL_ARGS=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            GLOBAL_ARGS="$GLOBAL_ARGS -v"
          fi
          if [ "${{ inputs.quiet }}" = "true" ]; then
            GLOBAL_ARGS="$GLOBAL_ARGS -q"
          fi

          BUILD_ARGS="b"

          # ----- Toggle flags -----
          if [ "${{ inputs.force }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS -f"
          fi
          if [ "${{ inputs.no_apk }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS --no-apk"
          fi
          if [ "${{ inputs.no_crunch }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS -nc"
          fi
          if [ "${{ inputs.copy_original }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS -c"
          fi
          if [ "${{ inputs.debuggable }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS --debuggable"
          fi
          if [ "${{ inputs.net_sec_conf }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS --net-sec-conf"
          fi
          if [ "${{ inputs.no_resource_removal }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS --no-resource-removal"
          fi
          if [ "${{ inputs.proguard_conditional_keep_rules }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS --proguard-conditional-keep-rules"
          fi
          if [ "${{ inputs.no_resource_quarantine }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS --no-resource-quarantine"
          fi
          if [ "${{ inputs.keep_cross_package_metadata }}" = "true" ]; then
            BUILD_ARGS="$BUILD_ARGS --keep-cross-package-metadata"
          fi

          # ----- Flags with arguments (only applied when their toggle is checked) -----
          if [ "${{ inputs.use_png_compression_level }}" = "true" ]; then
            LEVEL="${{ inputs.png_compression_level }}"
            if ! echo "$LEVEL" | grep -Eq '^[0-9]$'; then
              echo "::error::png_compression_level must be a single digit 0-9 (got '$LEVEL')."
              exit 1
            fi
            BUILD_ARGS="$BUILD_ARGS --png-compression-level $LEVEL"
          fi
          if [ "${{ inputs.use_aapt }}" = "true" ]; then
            AAPT_PATH="${{ inputs.aapt_path }}"
            if [ -z "$AAPT_PATH" ]; then
              echo "::error::use_aapt is enabled but aapt_path is empty."
              exit 1
            fi
            BUILD_ARGS="$BUILD_ARGS --aapt $AAPT_PATH"
          fi
          if [ "${{ inputs.use_jobs }}" = "true" ]; then
            JOBS_VAL="${{ inputs.jobs }}"
            if ! echo "$JOBS_VAL" | grep -Eq '^[0-9]+$'; then
              echo "::error::jobs must be a positive integer (got '$JOBS_VAL')."
              exit 1
            fi
            BUILD_ARGS="$BUILD_ARGS -j $JOBS_VAL"
          fi
          if [ "${{ inputs.use_frame_path }}" = "true" ]; then
            FRAME_PATH="${{ inputs.frame_path }}"
            if [ -z "$FRAME_PATH" ]; then
              echo "::error::use_frame_path is enabled but frame_path is empty."
              exit 1
            fi
            BUILD_ARGS="$BUILD_ARGS -p $FRAME_PATH"
          fi
          EXTRA="${{ inputs.extra_args }}"
          if [ -n "$EXTRA" ]; then
            BUILD_ARGS="$BUILD_ARGS $EXTRA"
          fi

          OUTPUT_DIR="/tmp/recompiled-output"
          BUILD_ARGS="$BUILD_ARGS -o $OUTPUT_DIR/${{ env.REPO_NAME }}.apk"

          echo "Running: java -jar $APKTOOL_JAR $GLOBAL_ARGS $BUILD_ARGS $DECOMPILED_DIR"
          java -jar "${{ env.APKTOOL_JAR }}" $GLOBAL_ARGS $BUILD_ARGS "${{ env.DECOMPILED_DIR }}"

          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          echo "Recompilation complete."
          ls -la "$OUTPUT_DIR"

      - name: Zipalign APK
        if: env.SOURCE_TYPE == 'apk' && inputs.no_apk != true
        run: |
          ANDROID_HOME=/tmp/android-sdk
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          # Install build-tools to get zipalign
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;36.0.0"
          ZIPALIGN="$ANDROID_HOME/build-tools/36.0.0/zipalign"

          INPUT_APK="${{ env.OUTPUT_DIR }}/${{ env.REPO_NAME }}.apk"
          ALIGNED_APK="${{ env.OUTPUT_DIR }}/${{ env.REPO_NAME }}-aligned.apk"

          echo "Running zipalign on $INPUT_APK"
          "$ZIPALIGN" -f -v 4 "$INPUT_APK" "$ALIGNED_APK"

          # Replace original with aligned version
          mv "$ALIGNED_APK" "$INPUT_APK"
          echo "Zipalign complete."
          ls -la "$INPUT_APK"

      - name: Sign APK with ehcosmart key
        if: env.SOURCE_TYPE == 'apk' && inputs.no_apk != true
        run: |
          ANDROID_HOME=/tmp/android-sdk
          APKSIGNER="$ANDROID_HOME/build-tools/36.0.0/apksigner"

          INPUT_APK="${{ env.OUTPUT_DIR }}/${{ env.REPO_NAME }}.apk"
          KEYSTORE="${{ github.workspace }}/.github/ehcosmart.jks"

          echo "Signing APK with ehcosmart keystore"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias ehcosmart \
            --ks-pass pass:ehcosmart \
            --key-pass pass:ehcosmart \
            "$INPUT_APK"

          echo "Verifying signature..."
          "$APKSIGNER" verify --verbose "$INPUT_APK"
          echo "APK signed successfully."

      - name: Recompile JAR
        if: env.SOURCE_TYPE == 'jar'
        run: |
          OUTPUT_DIR="/tmp/recompiled-output"
          mkdir -p "$OUTPUT_DIR"

          GLOBAL_ARGS=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            GLOBAL_ARGS="$GLOBAL_ARGS -v"
          fi
          if [ "${{ inputs.quiet }}" = "true" ]; then
            GLOBAL_ARGS="$GLOBAL_ARGS -q"
          fi

          echo "Recompiling JAR with apktool..."
          java -jar "${{ env.APKTOOL_JAR }}" $GLOBAL_ARGS b "${{ env.DECOMPILED_DIR }}" \
            -o "$OUTPUT_DIR/${{ env.REPO_NAME }}.jar"

          echo "OUTPUT_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          echo "JAR recompilation complete."
          ls -la "$OUTPUT_DIR"

      - name: Upload recompiled artifact
        uses: actions/upload-artifact@v7
        with:
          name: recompiled-${{ env.SOURCE_TYPE }}
          path: ${{ env.OUTPUT_DIR }}/*.${{ env.SOURCE_TYPE }}

      - name: Summary
        run: |
          echo "## Recompilation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Source Repository:** ${{ inputs.decompiled_repo_url }}" >> "$GITHUB_STEP_SUMMARY"
          BRANCH="${{ inputs.branch }}"
          if [ -n "$BRANCH" ]; then
            echo "- **Branch:** $BRANCH" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Source Type:** ${{ env.SOURCE_TYPE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Output:** ${{ env.REPO_NAME }}.${{ env.SOURCE_TYPE }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ env.SOURCE_TYPE }}" = "apk" ] && [ "${{ inputs.no_apk }}" != "true" ]; then
            echo "- **Zipaligned:** ✅ Yes" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Signed:** ✅ ehcosmart (O=ehcosmart)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Artifact:** recompiled-${{ env.SOURCE_TYPE }}" >> "$GITHUB_STEP_SUMMARY"
