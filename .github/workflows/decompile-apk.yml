name: Decompile APK/JAR

on:
  workflow_dispatch:
    inputs:
      # ----- Source -----
      apk_url:
        description: 'Direct download URL of the APK/APKM/APKS/XAPK/JAR file'
        required: true
        type: string
      repo_owner:
        description: 'GitHub user or organization where the repository will be created'
        required: true
        default: 'EduardoC3677'
        type: string
      repo_name:
        description: 'Repository name override (leave empty to auto-generate from package name)'
        required: false
        default: ''
        type: string

      # ----- Common decode flags (toggles) -----
      force:
        description: 'Force delete destination directory (-f / --force) [APK only]'
        required: false
        default: true
        type: boolean
      no_src:
        description: 'Do not decode sources (-s / --no-src) [APK only]'
        required: false
        default: false
        type: boolean
      all_src:
        description: 'Decode all sources in the apk including unknown dex files (-a / --all-src). Conflicts with --no-src. [APK only]'
        required: false
        default: false
        type: boolean
      no_res:
        description: 'Do not decode resources (-r / --no-res) [APK only]'
        required: false
        default: false
        type: boolean
      only_manifest:
        description: 'Only decode AndroidManifest.xml without resources (--only-manifest). Conflicts with --no-res. [APK only]'
        required: false
        default: false
        type: boolean
      no_assets:
        description: 'Do not decode assets (--no-assets) [APK only]'
        required: false
        default: false
        type: boolean
      no_debug_info:
        description: 'Do not include debug info (--no-debug-info). Conflicts with --no-src. [APK only]'
        required: false
        default: false
        type: boolean
      keep_broken_res:
        description: 'Keep broken resources (--keep-broken-res). Conflicts with --no-res / --only-manifest. [APK only]'
        required: false
        default: false
        type: boolean
      ignore_raw_values:
        description: 'Ignore raw attribute values in XML resource files (--ignore-raw-values). Conflicts with --no-res. [APK only]'
        required: false
        default: false
        type: boolean
      match_original:
        description: 'Keep files closest to original (--match-original). Prevents rebuild. [APK only]'
        required: false
        default: false
        type: boolean

      # ----- Flags with arguments (toggle + value) -----
      use_res_resolve_mode:
        description: 'Set the resolve mode for resources (--res-resolve-mode). Conflicts with --no-res / --only-manifest. [APK only]'
        required: false
        default: false
        type: boolean
      res_resolve_mode:
        description: 'Resolve mode value: default | greedy | lazy (only applied if use_res_resolve_mode is checked).'
        required: false
        default: 'default'
        type: choice
        options:
          - default
          - greedy
          - lazy

      use_jobs:
        description: 'Override the parallel-jobs count (-j / --jobs) [APK only]'
        required: false
        default: false
        type: boolean
      jobs:
        description: 'Number of parallel jobs (only applied if use_jobs is checked).'
        required: false
        default: '4'
        type: string

      use_frame_path:
        description: 'Use a custom framework directory (-p / --frame-path) [APK only]'
        required: false
        default: false
        type: boolean
      frame_path:
        description: 'Path to framework files (only applied if use_frame_path is checked).'
        required: false
        default: ''
        type: string

      use_frame_tag:
        description: 'Use framework files tagged with <tag> (-t / --frame-tag) [APK only]'
        required: false
        default: false
        type: boolean
      frame_tag:
        description: 'Framework tag (only applied if use_frame_tag is checked).'
        required: false
        default: ''
        type: string

      # ----- Verbosity -----
      verbose:
        description: 'Increase output verbosity (-v)'
        required: false
        default: false
        type: boolean
      quiet:
        description: 'Suppress normal output (-q)'
        required: false
        default: false
        type: boolean

      # ----- Misc -----
      extra_args:
        description: 'Additional raw apktool decode arguments appended last (advanced; space-separated). Use only if the flag you need is not exposed above.'
        required: false
        default: ''
        type: string

permissions:
  contents: read

jobs:
  decompile:
    runs-on: ubuntu-latest
    name: Decompile APK/JAR and push to repository
    steps:
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21

      - name: Download apktool from latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p /tmp/apktool-download
          gh release download --repo "${{ github.repository }}" \
            --pattern "apktool-*.jar" --dir /tmp/apktool-download
          JAR_PATH=$(find /tmp/apktool-download -name "apktool-*.jar" | head -1)
          if [ -z "$JAR_PATH" ]; then
            echo "::error::Failed to download apktool JAR from latest release"
            exit 1
          fi
          echo "APKTOOL_JAR=$JAR_PATH" >> "$GITHUB_ENV"
          echo "Downloaded apktool: $JAR_PATH"

      - name: Download file
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip
          mkdir -p /tmp/apk-download
          FILE_URL="${{ inputs.apk_url }}"
          # Sanitize HTML-encoded ampersands in URLs (common when copying from web pages)
          FILE_URL=$(echo "$FILE_URL" | sed 's/&amp;/\&/g')
          FILENAME=$(basename "$FILE_URL" | sed 's/?.*//')
          # If no extension, default to .apk
          if [[ "$FILENAME" != *.* ]]; then
            FILENAME="${FILENAME}.apk"
          fi
          wget -q --content-disposition -O "/tmp/apk-download/$FILENAME" "$FILE_URL" \
            || curl -fSL -o "/tmp/apk-download/$FILENAME" "$FILE_URL"
          echo "DOWNLOADED_FILE=/tmp/apk-download/$FILENAME" >> "$GITHUB_ENV"
          echo "Downloaded: $FILENAME"
          ls -la /tmp/apk-download/

      - name: Detect file type
        run: |
          FILE="${{ env.DOWNLOADED_FILE }}"
          EXT="${FILE##*.}"
          EXT_LOWER=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')

          if [[ "$EXT_LOWER" == "jar" ]]; then
            echo "FILE_TYPE=jar" >> "$GITHUB_ENV"
            echo "Detected JAR file"
          else
            echo "FILE_TYPE=apk" >> "$GITHUB_ENV"
            echo "Detected APK file (extension: .$EXT_LOWER)"
          fi

      - name: Download Android 16 framework (API 36)
        if: env.FILE_TYPE == 'apk'
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip
          mkdir -p /tmp/android-sdk
          # Download Android SDK command-line tools (update URL when newer versions are released)
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          wget -q "$CMDLINE_TOOLS_URL" -O /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/android-sdk/cmdline-tools
          mv /tmp/android-sdk/cmdline-tools/cmdline-tools /tmp/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=/tmp/android-sdk
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platforms;android-36"
          FRAMEWORK_PATH="$ANDROID_HOME/platforms/android-36/android.jar"
          echo "Framework downloaded at: $FRAMEWORK_PATH"
          ls -la "$FRAMEWORK_PATH"

      - name: Install framework into apktool
        if: env.FILE_TYPE == 'apk'
        run: |
          ANDROID_HOME=/tmp/android-sdk
          FRAMEWORK_PATH="$ANDROID_HOME/platforms/android-36/android.jar"
          java -jar "${{ env.APKTOOL_JAR }}" install-framework "$FRAMEWORK_PATH"
          echo "Android 16 framework installed successfully."

      - name: Convert split APKs to single APK (if needed)
        if: env.FILE_TYPE == 'apk'
        run: |
          FILE="${{ env.DOWNLOADED_FILE }}"
          EXT="${FILE##*.}"
          EXT_LOWER=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')

          if [[ "$EXT_LOWER" == "apk" ]]; then
            echo "File is already an APK, no conversion needed."
            echo "APK_FILE=$FILE" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Detected split APK format: .$EXT_LOWER — merging with APKEditor..."

          # Download REAndroid/APKEditor for merging split APKs
          APKEDITOR_URL="https://github.com/REAndroid/APKEditor/releases/download/V1.4.8/APKEditor-1.4.8.jar"
          wget -q "$APKEDITOR_URL" -O /tmp/APKEditor.jar \
            || curl -fSL -o /tmp/APKEditor.jar "$APKEDITOR_URL"

          OUTPUT_APK="/tmp/apk-download/converted.apk"
          echo "Running: java -Xmx4g -jar APKEditor.jar m -i $FILE -o $OUTPUT_APK -f"
          java -Xmx4g -jar /tmp/APKEditor.jar m -i "$FILE" -o "$OUTPUT_APK" -f

          echo "APK_FILE=$OUTPUT_APK" >> "$GITHUB_ENV"
          echo "Converted APK ready at: $OUTPUT_APK"
          ls -la "$OUTPUT_APK"

      - name: Decompile APK
        if: env.FILE_TYPE == 'apk'
        run: |
          # Build the apktool argument list. The CLI grammar is:
          #     apktool [-v|-q] d [decode-options...] <apkFile>
          # Verbose/quiet are GLOBAL options, must come BEFORE the "d" subcommand.
          GLOBAL_ARGS=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            GLOBAL_ARGS="$GLOBAL_ARGS -v"
          fi
          if [ "${{ inputs.quiet }}" = "true" ]; then
            GLOBAL_ARGS="$GLOBAL_ARGS -q"
          fi

          DECODE_ARGS="d"

          # ----- Toggle flags (with conflict detection) -----
          if [ "${{ inputs.no_src }}" = "true" ] && [ "${{ inputs.all_src }}" = "true" ]; then
            echo "::error::--no-src and --all-src are mutually exclusive."
            exit 1
          fi
          if [ "${{ inputs.no_res }}" = "true" ] && [ "${{ inputs.only_manifest }}" = "true" ]; then
            echo "::error::--no-res and --only-manifest are mutually exclusive."
            exit 1
          fi
          if [ "${{ inputs.no_src }}" = "true" ] && [ "${{ inputs.no_debug_info }}" = "true" ]; then
            echo "::error::--no-debug-info has no effect when --no-src is set."
            exit 1
          fi

          if [ "${{ inputs.force }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS -f"
          fi
          if [ "${{ inputs.no_src }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS -s"
          fi
          if [ "${{ inputs.all_src }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS -a"
          fi
          if [ "${{ inputs.no_res }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS -r"
          fi
          if [ "${{ inputs.only_manifest }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS --only-manifest"
          fi
          if [ "${{ inputs.no_assets }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS --no-assets"
          fi
          if [ "${{ inputs.no_debug_info }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS --no-debug-info"
          fi
          if [ "${{ inputs.keep_broken_res }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS --keep-broken-res"
          fi
          if [ "${{ inputs.ignore_raw_values }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS --ignore-raw-values"
          fi
          if [ "${{ inputs.match_original }}" = "true" ]; then
            DECODE_ARGS="$DECODE_ARGS --match-original"
          fi

          # ----- Flags with arguments (only applied when toggle is checked) -----
          if [ "${{ inputs.use_res_resolve_mode }}" = "true" ]; then
            MODE="${{ inputs.res_resolve_mode }}"
            case "$MODE" in
              default|greedy|lazy) ;;
              *) echo "::error::res_resolve_mode must be one of: default, greedy, lazy (got '$MODE')."; exit 1 ;;
            esac
            DECODE_ARGS="$DECODE_ARGS --res-resolve-mode $MODE"
          fi
          if [ "${{ inputs.use_jobs }}" = "true" ]; then
            JOBS_VAL="${{ inputs.jobs }}"
            if ! echo "$JOBS_VAL" | grep -Eq '^[0-9]+$'; then
              echo "::error::jobs must be a positive integer (got '$JOBS_VAL')."
              exit 1
            fi
            DECODE_ARGS="$DECODE_ARGS -j $JOBS_VAL"
          fi
          if [ "${{ inputs.use_frame_path }}" = "true" ]; then
            FRAME_PATH="${{ inputs.frame_path }}"
            if [ -z "$FRAME_PATH" ]; then
              echo "::error::use_frame_path is enabled but frame_path is empty."
              exit 1
            fi
            DECODE_ARGS="$DECODE_ARGS -p $FRAME_PATH"
          fi
          if [ "${{ inputs.use_frame_tag }}" = "true" ]; then
            FRAME_TAG="${{ inputs.frame_tag }}"
            if [ -z "$FRAME_TAG" ]; then
              echo "::error::use_frame_tag is enabled but frame_tag is empty."
              exit 1
            fi
            DECODE_ARGS="$DECODE_ARGS -t $FRAME_TAG"
          fi
          EXTRA="${{ inputs.extra_args }}"
          if [ -n "$EXTRA" ]; then
            DECODE_ARGS="$DECODE_ARGS $EXTRA"
          fi

          OUTPUT_DIR="/tmp/decompiled-apk"
          DECODE_ARGS="$DECODE_ARGS -o $OUTPUT_DIR"

          echo "Running: java -jar $APKTOOL_JAR $GLOBAL_ARGS $DECODE_ARGS $APK_FILE"
          java -jar "${{ env.APKTOOL_JAR }}" $GLOBAL_ARGS $DECODE_ARGS "${{ env.APK_FILE }}"

          echo "DECOMPILED_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          echo "Decompilation complete."
          ls -la "$OUTPUT_DIR"

      - name: Decompile JAR
        if: env.FILE_TYPE == 'jar'
        run: |
          OUTPUT_DIR="/tmp/decompiled-jar"

          GLOBAL_ARGS=""
          if [ "${{ inputs.verbose }}" = "true" ]; then
            GLOBAL_ARGS="$GLOBAL_ARGS -v"
          fi
          if [ "${{ inputs.quiet }}" = "true" ]; then
            GLOBAL_ARGS="$GLOBAL_ARGS -q"
          fi

          echo "Decompiling JAR with apktool..."
          java -jar "${{ env.APKTOOL_JAR }}" $GLOBAL_ARGS d "${{ env.DOWNLOADED_FILE }}" -o "$OUTPUT_DIR" -f

          echo "DECOMPILED_DIR=$OUTPUT_DIR" >> "$GITHUB_ENV"
          echo "JAR decompilation complete."
          ls -la "$OUTPUT_DIR"

      - name: Generate repository name
        run: |
          DECOMPILED_DIR="${{ env.DECOMPILED_DIR }}"
          FILE_TYPE="${{ env.FILE_TYPE }}"

          PACKAGE_NAME=""
          if [ "$FILE_TYPE" = "apk" ]; then
            MANIFEST="$DECOMPILED_DIR/AndroidManifest.xml"
            if [ -f "$MANIFEST" ]; then
              PACKAGE_NAME=$(sed -n 's/.*package="\([^"]*\)".*/\1/p' "$MANIFEST" | head -1)
            fi
          else
            # For JAR files, derive name from the downloaded file
            BASENAME=$(basename "${{ env.DOWNLOADED_FILE }}" .jar)
            PACKAGE_NAME="$BASENAME"
          fi

          USER_NAME="${{ inputs.repo_name }}"
          if [ -n "$USER_NAME" ]; then
            REPO_NAME="$USER_NAME"
            echo "Using user-provided repository name: $REPO_NAME"
          elif [ -n "$PACKAGE_NAME" ]; then
            REPO_NAME=$(echo "$PACKAGE_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9._-]/-/g' | tr '.' '-')
            echo "Auto-generated repository name from package: $REPO_NAME"
          else
            REPO_NAME="decompiled-${FILE_TYPE}-$(date +%Y%m%d%H%M%S)"
            echo "Could not extract package name, using fallback: $REPO_NAME"
          fi

          echo "REPO_NAME=$REPO_NAME" >> "$GITHUB_ENV"
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"

      - name: Create repository with decompiled content
        env:
          GH_TOKEN: ${{ secrets.ONT }}
        run: |
          REPO_OWNER="${{ inputs.repo_owner }}"
          BASE_NAME="${{ env.REPO_NAME }}"
          FINAL_NAME="$BASE_NAME"

          # Check if repo exists and find available name with suffix
          check_repo_exists() {
            gh repo view "$REPO_OWNER/$1" > /dev/null 2>&1
            return $?
          }

          if check_repo_exists "$FINAL_NAME"; then
            COUNTER=1
            while check_repo_exists "${BASE_NAME}_${COUNTER}"; do
              COUNTER=$((COUNTER + 1))
            done
            FINAL_NAME="${BASE_NAME}_${COUNTER}"
          fi

          echo "Creating repository: $REPO_OWNER/$FINAL_NAME"

          # Create the new repository (try with owner prefix first, fallback to short name)
          gh repo create "$REPO_OWNER/$FINAL_NAME" --public \
            --description "Decompiled ${{ env.FILE_TYPE }}: $BASE_NAME"

          # Push decompiled content
          cd "${{ env.DECOMPILED_DIR }}"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Set up Git LFS for large files (tracking files over 50MB)
          git lfs install
          find . -size +50M -type f -print0 | while IFS= read -r -d '' large_file; do
            # Strip leading ./ for clean LFS tracking patterns
            clean_path="${large_file#./}"
            echo "Tracking large file with LFS: $clean_path"
            git lfs track "$clean_path"
          done

          # Commit .gitattributes first if LFS tracking was added
          if [ -f .gitattributes ]; then
            git add .gitattributes
          fi

          git add -A
          git commit -m "Decompiled ${{ env.FILE_TYPE }} content from: $BASE_NAME"
          git branch -M main
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO_OWNER}/${FINAL_NAME}.git"
          git push -u origin main

          echo "Repository created: https://github.com/$REPO_OWNER/$FINAL_NAME"
          echo "CREATED_REPO=$REPO_OWNER/$FINAL_NAME" >> "$GITHUB_ENV"

      - name: Summary
        run: |
          echo "## Decompilation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Source URL:** ${{ inputs.apk_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Repository:** [${{ env.CREATED_REPO }}](https://github.com/${{ env.CREATED_REPO }})" >> "$GITHUB_STEP_SUMMARY"
